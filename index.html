<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPTV Checkout</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{

width:100%;
max-width:500px;

background:#161616;

border:1px solid #c89b3c;

border-radius:18px;

padding:35px;

box-shadow:0 0 25px rgba(0,0,0,.4);

}

.logo{

text-align:center;

font-size:34px;

font-weight:bold;

color:#d4af37;

margin-bottom:8px;

}

.subtitle{

text-align:center;

color:#bdbdbd;

margin-bottom:30px;

font-size:16px;

}

.button{

width:100%;

padding:16px;

margin-bottom:15px;

font-size:18px;

font-weight:bold;

background:#d4af37;

color:#111;

border:none;

border-radius:10px;

cursor:pointer;

transition:.2s;

}

.button:hover{

transform:translateY(-2px);

}

.footer{

margin-top:25px;

text-align:center;

color:#888;

font-size:13px;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
IPTV
</div>

<div class="subtitle">
Choose Your Subscription
</div>

<button class="button">
📺 1 Device
</button>

<button class="button">
📺📺 2 Devices
</button>

<button class="button">
📺📺📺 3 Devices
</button>

<div class="footer">
Secure Checkout
</div>

</div>

</body>

</html>
